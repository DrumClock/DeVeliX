# This file contains a configuration snippet for Oozing prevent.
#
#
#####################################################################
#  Variable for this configurations
#  ATTENTION: 
#  KLIPPER merges all [gcode_macro VARIABLE] into one configuration file.
#  If the variable name already exists it will be overwritten!
#####################################################################

[gcode_macro VARIABLE]
gcode:

variable_oozing_prevent: { }      # e.g. 'diff_temp'{ 'extruder': 10.0, 'extruder1': 15.0 }
                                  #      'target_temp'{ 'extruder': 235.0, 'extruder1': 235.0 }
                                  #      'menu':'extruder'
                                  #      'enable': false

#############################################################
# Creating a list of variables from the printer configuration
# using [gcode_macro RUN_MACRO_INIT] which will run
# in [delayed_gcode _INIT] after restarting FW Klipper.
#
# This macro finds all defined _INIT_* macros and runs them.
# The start order can be defined by names: _A_INIT_* , _B_INIT_* etc.
#############################################################

[gcode_macro _INIT_OOZING_PREVENT_PARAM]   
gcode:

   {% set user_vars = printer["gcode_macro VARIABLE"] %} 
 
 {% if user_vars.tool|length > 1 %}
 
      {% set name = "oozing_prevent" %}     # name variable     
      {% set init = { 'enable':false }  %}  # load act preset  
   
      ### init 'diff_temp' and 'target_temp' for extruder
      {% for tool in printer.heaters.available_heaters|sort %} ; check for all available heaters
           {% if 'extruder' in tool %} 
               ### define difference temperature
              {% set _dummy = init.update({ 'diff_temp': { tool:20.0 }})  if init.diff_temp is not defined  else  init.diff_temp.update({ tool:20.0 }) %}   
			  
			   ### define target temperature (stored for later use)
			  {% set t_temp = printer[tool].target %} 
              {% set _dummy = init.update({ 'target_temp': { tool:t_temp }})  if init.target_temp is not defined  else  init.target_temp.update({ tool:t_temp }) %}  
			  
          {% endif %}
      {% endfor %}
      
      
       ### init variable for LCD menu 
      {% if printer.configfile.settings['menu __main __user __oozing'] is defined  %}  
         {% set _dummy =  init.update( { 'menu': 'extruder'} ) %}
     {% endif %} 

     {action_respond_info("Creating a list of variables for tool oozing param ") if printer.save_variables.variables.dump_list}

       
       ## update variable "oozing_prevent"
       SET_GCODE_VARIABLE MACRO=VARIABLE  VARIABLE={name} VALUE="{init}"
     
     {% endif %}  

   
# ########################################################################## 
# ##                    OOZING PREVENT MANAGMENT                         ###
# ########################################################################## 
#
#
# for Slicer: 
#
# add start G-code: ( to end of block )
#  SET_OOZING_PREVENT  ENABLE=1
#
# add end G-code: (to beginning of block)
#  SET_OOZING_PREVENT  ENABLE=0
#
#
# ##########################################################################
   
[gcode_macro ACTIVATE_OOZING_PREVENT]
description: ACTIVATE_OOZING_PREVENT  COOLING=extruder  HEATING=extruder1   WAIT=False
gcode:

    ###  params COOLING / HEATING =[extruder|extruder1|extruder2|...] 
    ###  params WAIT=  False / True
    
  {% set user_vars = printer["gcode_macro VARIABLE"] %}

  {% if user_vars.oozing_prevent.enable|lower == 'true' %}      
     {action_respond_info("Activate oozing prevent extruder.")}             
  
      {% set wait = params.WAIT|default('False')%}
    
    ### Process COOLING or HEATING parameter

   {% for mode_param in ['COOLING', 'HEATING'] %}
     {% if mode_param in params %}
      
      {% set target_extruder = params[mode_param]|lower %}
      {% set mode_multiplier = -1 if mode_param == 'COOLING' else 1 %}
      {% set mode_name = 'Cooling' if mode_param == 'COOLING' else 'Heating' %}
      
      ### Get stored target temperature and current target
      {% set stored_target = user_vars.oozing_prevent.target_temp[target_extruder] %}
      {% set current_target = printer[target_extruder].target %}
      
      ### Check if stored target is within ±5°C of current target
      {% if (stored_target - current_target)|abs <= 5.0 %}
          {% set base_temp = stored_target %}
          # {action_respond_info("Using stored target %s°C for %s (current target: %s°C)" % (stored_target, target_extruder, current_target))}
      {% else %}
          {% set base_temp = current_target %}
          # {action_respond_info("Stored target %s°C differs >5°C from current target %s°C, using current for %s" % (stored_target, current_target, target_extruder))}
      {% endif %}
      
      {% set new_temp = (base_temp + (user_vars.oozing_prevent.diff_temp[target_extruder] * mode_multiplier))|int %}

      {% if printer[target_extruder].can_extrude | lower == 'true' %}
         {action_respond_info("%s %s from %s to %s°C" % (mode_name, target_extruder, base_temp, new_temp))} 
         
        {% if wait == 'True' and new_temp != 0 %} 
           SET_HEATER_TEMPERATURE HEATER="{target_extruder}" TARGET={new_temp}
           TEMPERATURE_WAIT SENSOR="{target_extruder}" MINIMUM={new_temp - 2.0} MAXIMUM={new_temp + 2.0}
        {% else %}               		 
           SET_HEATER_TEMPERATURE HEATER="{target_extruder}" TARGET={new_temp} 
        {% endif %}  
        
      {% endif %}
      
     {% endif %}
   {% endfor %}   

  {% else %}
      {action_respond_info("Oozing prevent is disabled.")} 
  {% endif %}

##########################################################################
[gcode_macro SET_OOZING_PREVENT]
description: SET_OOZING_PREVENT ENABLE=[0|1]
gcode:
      
    {% set user_vars = printer["gcode_macro VARIABLE"] %}   
    {% set name = "oozing_prevent" %}       # name variable 
    {% set init = user_vars[name] %}  
     
    {% if 'gcode_macro ACTIVATE_OOZING_PREVENT' in printer and user_vars.tool|length > 1 %}

      ### ENABLE=1 ...cooling / ENABLE=0 ...restore target temps
      {% set enable = params.ENABLE if params.ENABLE is defined else 2 %} 

      ### check command for oozing prevent 
      {% if enable not in ['0','1'] %}
          {action_respond_info("Invalid ENABLE parameter.")} 

      {% elif user_vars.oozing_prevent.enable|lower == 'false' and enable|int != 1 %}
          {action_respond_info("Oozing prevent is disabled.")} 

      {% elif user_vars.oozing_prevent.enable|lower == 'true' and enable|int != 0 %}
          {action_respond_info("Oozing prevent is already active.")} 

      {% else %}
      
          ### SAVE CURRENT TARGET TEMPERATURES FOR ALL EXTRUDERS
          {% if enable|int == 1 %}
              {action_respond_info("Saving current target temperatures for all extruders...")}
              {% for tool in printer.heaters.available_heaters|sort %}
                  {% if 'extruder' in tool %}
                      {% set current_target = printer[tool].target %}
                      {% set _dummy = init.target_temp.update({tool: current_target}) %}
                      {action_respond_info("  %s: %s°C" % (tool, current_target))}
                  {% endif %}
              {% endfor %}
          {% endif %}
      
          ### process all inactive extruders
          {% for tool in printer.heaters.available_heaters|sort %}    
             {% if 'extruder' in tool and tool != printer.toolhead.extruder %}  

               {% set stored_target = init.target_temp[tool] %}

               {% if enable|int == 1 %}
                   ### ENABLE → cooling
                   {% set new_temp = (stored_target - user_vars.oozing_prevent.diff_temp[tool])|int %}
               {% else %}
                   ### DISABLE → restore EXACT stored target
                   {% set new_temp = stored_target|int %}
               {% endif %}

               ### safety check for min_extrude_temp
               {% if new_temp >= (printer.configfile.config[tool].min_extrude_temp)|int %}
                   {% set _tool = tool.lstrip("extruder") if tool.lstrip("extruder")|length != 0 else 0 %}
                   {action_respond_info("Setting %s to %s°C (stored target: %s°C)" % (tool, new_temp, stored_target))}
                   M104 S{new_temp} T{_tool}
               {% else %}
                   {action_respond_info("Skipping %s - calculated temp %s°C below min_extrude_temp" % (tool, new_temp))}
               {% endif %}

            {% endif %}
          {% endfor %}

          ### update variable 'oozing_prevent'
          {% set _dummy = init.update({'enable': True if enable|int == 1 else False}) %}
          SET_GCODE_VARIABLE MACRO=VARIABLE VARIABLE={name} VALUE="{init}" 
      
      {% endif %}
    {% endif %}

            
################################################################################
# This macro allows the user to change the value in  'variable_oozing_prevent'
################################################################################

[gcode_macro SET_OOZING_PARAM]
description:  SET_OOZING_PARAM    EXTRUDER=extruder  DIFF_TEMP=10
gcode:
  
      {% set user_vars = printer["gcode_macro VARIABLE"] %}    
      {% set name = 'oozing_prevent' %}   
      {% set init = user_vars.oozing_prevent   %}     						                         
     
   {% for key in params %}       
          
         {% if key|lower =='extruder' %} 
             {% set extruder = params[key]|default('extruder')  %}
               
             {% if  params.DIFF_TEMP is defined  and extruder in  init.diff_temp %}             
                {% set _dummy = init.diff_temp.update( {extruder : params.DIFF_TEMP|int} )  %}
             {% endif%}    
  
         {% endif %}  
    {% endfor %}   
  
       ### update variable 'oozing_prevent'   
       SET_GCODE_VARIABLE MACRO=VARIABLE VARIABLE={name}  VALUE="{init}"  

     # {action_respond_info("variable_%s : %s" % (name,init))}