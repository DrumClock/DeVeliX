[gcode_macro TEST_TOOL]
gcode:

        {% if  'extruder' in  params.T  %}           
           {% set tool = params.T.lstrip("extruder") if params.T.lstrip("extruder")|length != 0 else 0 %}
        {% else %}
           {% set tool = params.T %}
        {% endif %}
  
           {action_respond_info("T=%s"  %  tool)}
